
<style>
#erd svg { width: 100%; }
</style>
<h2 class="sr-only">Data model ERD for the AI Copilot hiring quest platform</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  USERS {
    uuid id PK
    string email
    string hashed_password
    enum role "poster | candidate"
    timestamp created_at
    timestamp updated_at
  }

  CANDIDATE_PROFILES {
    uuid id PK
    uuid user_id FK
    string full_name
    string phone
    text summary
    text[] tech_stack
    text[] preferred_roles
    int experience_years
    timestamp updated_at
  }

  DOCUMENTS {
    uuid id PK
    uuid uploaded_by FK
    string title
    enum source_type "pdf | txt | md | slack_json"
    text raw_text
    jsonb metadata
    enum status "pending | processing | processed | failed"
    timestamp created_at
    timestamp updated_at
  }

  CHUNKS {
    uuid id PK
    uuid document_id FK
    int chunk_index
    text content
    int token_count
    string qdrant_point_id
    timestamp created_at
  }

  CONVERSATIONS {
    uuid id PK
    uuid user_id FK
    string title
    enum scope "global | document_scoped"
    uuid scoped_document_id FK
    timestamp created_at
    timestamp last_message_at
  }

  MESSAGES {
    uuid id PK
    uuid conversation_id FK
    enum role "user | assistant"
    text content
    jsonb sources
    float confidence
    text reasoning
    timestamp created_at
  }

  INSIGHTS {
    uuid id PK
    string title
    text body
    enum category "conflict | pattern | decision | issue"
    jsonb source_document_ids
    float relevance_score
    timestamp generated_at
  }

  USERS ||--o{ CANDIDATE_PROFILES : "has"
  USERS ||--o{ DOCUMENTS : "uploads"
  USERS ||--o{ CONVERSATIONS : "owns"
  DOCUMENTS ||--o{ CHUNKS : "split into"
  CONVERSATIONS ||--o{ MESSAGES : "contains"
  CONVERSATIONS }o--o| DOCUMENTS : "scoped to"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
